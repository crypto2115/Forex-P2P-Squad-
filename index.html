<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forex P2P Squad</title>
    <style>
        /* ያንተ የድሮው ስታይል እንዳለ ሆኖ እነዚህ ተጨማሪዎች ናቸው */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #131722; color: #ffffff; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 420px; background: #1c2030; padding: 20px; border-radius: 12px; }
        
        /* Header section with Logo and Auth Buttons */
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .brand { display: flex; align-items: center; gap: 10px; }
        .brand-logo { width: 40px; height: 40px; background: #f3ba2f; border-radius: 8px; font-size: 24px; display: flex; align-items: center; justify-content: center; }
        .brand-title h2 { font-size: 18px; color: white; }
        .brand-title p { font-size: 12px; color: #848e9c; }
        
        /* Auth Area Styling */
        .auth-buttons { display: flex; flex-direction: column; gap: 5px; }
        .btn-login { background: #f3ba2f; color: #1e2329; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-register { background: #2b3139; color: #b7bdc6; border: 1px solid #474d57; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        
        /* User Profile Tag (Login ሲያደርግ የሚተካው) */
        .user-logged-in { display: none; align-items: center; gap: 8px; background: #25293a; padding: 8px 12px; border-radius: 20px; border: 1px solid #2a2e3f; }
        .user-name { color: #f3ba2f; font-weight: bold; font-size: 14px; }
        .btn-logout-mini { color: #f6465d; font-size: 12px; cursor: pointer; margin-left: 5px; text-decoration: underline; }

        /* Navigation Tabs */
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab { flex: 1; background: #25293a; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #2a2e3f; cursor: pointer; font-size: 14px; color: #b7bdc6; }
        .tab.active { border-color: #f3ba2f; color: white; }

        /* Content Blocks (የገጽህ ካርዶች) */
        .card { background: #171a26; border: 1px solid #25293a; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .rate-row { display: flex; justify-content: space-between; margin-top: 10px; font-size: 15px; }
        .address-box { background: #232838; border: 1px solid #f3ba2f; border-style: dashed; padding: 15px; border-radius: 8px; text-align: center; margin-top: 10px; }
        .btn-green { width: 100%; background: #0ecb81; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 15px; }
        
        /* Modal Popup Design for Login/Register Form */
        .auth-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1c2030; padding: 25px; border-radius: 12px; width: 90%; max-width: 360px; border: 1px solid #2a2e3f; }
        .modal-content h3 { margin-bottom: 15px; color: #f3ba2f; }
        .modal-content input { width: 100%; padding: 12px; background: #2b3139; border: 1px solid #474d57; border-radius: 6px; color: white; margin-bottom: 12px; outline: none; }
        .modal-content button { width: 100%; padding: 12px; background: #f3ba2f; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .modal-close { text-align: center; margin-top: 10px; color: #848e9c; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="header-top">
        <div class="brand">
            <div class="brand-logo">👑</div>
            <div class="brand-title">
                <h2>Forex P2P</h2>
                <p>Squad</p>
            </div>
        </div>
        
        <div id="auth-guest-view" class="auth-buttons">
            <button class="btn-login" onclick="openModal('login-modal')">Login (ግባ)</button>
            <button class="btn-register" onclick="openModal('register-modal')">Register (ተመዝገብ)</button>
        </div>

        <div id="auth-user-view" class="user-logged-in">
            <span>👤 <span id="display-username" class="user-name">---</span></span>
            <span class="btn-logout-mini" onclick="handleLogout()">ውጣ</span>
        </div>
    </div>

    <div class="nav-tabs">
        <div class="tab active">🏠 Home</div>
        <div class="tab" onclick="alert('P2P Trade ገጽ በቅርቡ...')">🔄 P2P Trade</div>
        <div class="tab">📖 Guide</div>
    </div>

    <div class="card">
        <p style="color: #848e9c; font-size: 14px;">📈 Withdrawal Rate (BEP20 USDT)</p>
        <div class="rate-row">
            <span>Under 10 USDT</span>
            <strong style="color: #f3ba2f;">170 ETB</strong>
        </div>
        <div class="rate-row">
            <span>10+ USDT</span>
            <strong style="color: #f3ba2f;">175 ETB</strong>
        </div>
    </div>

    <div class="card">
        <p style="color: #848e9c; font-size: 14px;">💳 BEP20 Deposit Address (የማስቀመጫ አድራሻ)</p>
        <p style="font-size: 13px; margin-top: 5px; color: #b7bdc6;">Your unique BEP20 deposit address is ready:</p>
        
        <div class="address-box">
            <code style="color: #f3ba2f; font-size: 14px;">0x71C...I5a6C</code>
            <p style="font-size: 12px; color: #848e9c; margin-top: 5px; cursor: pointer;">📋 Copy BEP20 Address</p>
        </div>
        
        <button class="btn-green">Address Generated!</button>
    </div>

</div>

<div id="login-modal" class="auth-modal">
    <div class="modal-content">
        <h3>መግቢያ ገጽ (Login)</h3>
        <input type="tel" id="login-phone" placeholder="ስልክ ቁጥር">
        <input type="password" id="login-pass" placeholder="የይለፍ ቃል">
        <button onclick="processLogin()">ግባ</button>
        <div class="modal-close" onclick="closeModal('login-modal')">❌ ዝጋ</div>
    </div>
</div>

<div id="register-modal" class="auth-modal">
    <div class="modal-content">
        <h3>አዲስ ምዝገባ</h3>
        <input type="text" id="reg-name" placeholder="ሙሉ ስም">
        <input type="tel" id="reg-phone" placeholder="ስልክ ቁጥር">
        <input type="password" id="reg-pass" placeholder="ፓስወርድ">
        <button onclick="processRegister()">ተመዝገብ</button>
        <div class="modal-close" onclick="closeModal('register-modal')">❌ ዝጋ</div>
    </div>
</div>


<script>
    // ሞዳሎችን ለመክፈት እና ለመዝጋት
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // አፑ ገና ሲከፈት በጀርባ ቼክ ማድረጊያ (Remember Me ሎጂክ)
    window.onload = function() {
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            // ተጠቃሚው ድሮ ገብቶ ከነበረ ስሙን በቀጥታ ከላይ ይተካዋል!
            updateHeaderForUser(JSON.parse(savedUser).name);
        }
    };

    // የምዝገባ ሒደት
    function processRegister() {
        const name = document.getElementById('reg-name').value.trim();
        const phone = document.getElementById('reg-phone').value.trim();
        const pass = document.getElementById('reg-pass').value.trim();

        if (!name || !phone || !pass) { alert('እባክዎ ሁሉንም ይሙሉ!'); return; }

        const userData = { name: name, phone: phone, password: pass };
        localStorage.setItem('user_' + phone, JSON.stringify(userData));
        localStorage.setItem('currentUser', JSON.stringify(userData)); // ለትውስታ

        closeModal('register-modal');
        updateHeaderForUser(name);
        alert('🎉 ምዝገባው ተሳክቷል!');
    }

    // የመግቢያ ሒደት
    function processLogin() {
        const phone = document.getElementById('login-phone').value.trim();
        const pass = document.getElementById('login-pass').value.trim();

        const savedData = localStorage.getItem('user_' + phone);
        if (savedData) {
            const user = JSON.parse(savedData);
            if (user.password === pass) {
                localStorage.setItem('currentUser', JSON.stringify(user)); // ለትውስታ
                closeModal('login-modal');
                updateHeaderForUser(user.name);
                alert('👋 እንኳን ደህና መጡ!');
            } else { alert('❌ የይለፍ ቃል ተሳስቷል!'); }
        } else { alert('❌ ይህ ስልክ አልተመዘገበም!'); }
    }

    // ከላይ ያለውን በተን በስም የመተኪያ ዋናው ፈንክሽን
    function updateHeaderForUser(username) {
        document.getElementById('auth-guest-view').style.display = 'none'; // በተኖቹን ደብቅ
        document.getElementById('auth-user-view').style.display = 'flex';   // ስሙን አሳይ
        document.getElementById('display-username').innerText = username;   // ስሙን መጻፍ
    }

    // ከሲስተሙ መውጫ (Logout)
    function handleLogout() {
        localStorage.removeItem('currentUser'); // ትውስታውን አጥፋ
        document.getElementById('auth-user-view').style.display = 'none';  // ስሙን ደብቅ
        document.getElementById('auth-guest-view').style.display = 'flex'; // በተኖቹን መልስ
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forex P2P Squad</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #131722; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 400px; background: #1c2030; padding: 30px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); border: 1px solid #2a2e3f; }
        .logo-section { text-align: center; margin-bottom: 25px; }
        .logo-section img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #f3ba2f; }
        .logo-section h2 { color: #f3ba2f; margin-top: 10px; font-size: 22px; }
        .page { display: none; }
        .page.active { display: block; }
        h3 { margin-bottom: 20px; text-align: center; color: #b7bdc6; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #848e9c; font-size: 14px; }
        input { width: 100%; padding: 12px; background: #2b3139; border: 1px solid #474d57; border-radius: 8px; color: white; font-size: 16px; outline: none; }
        input:focus { border-color: #f3ba2f; }
        button { width: 100%; padding: 14px; background: #f3ba2f; border: none; border-radius: 8px; color: #1e2329; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:hover { background: #e0aa2b; }
        .switch-text { text-align: center; margin-top: 15px; font-size: 14px; color: #848e9c; }
        .switch-text span { color: #f3ba2f; cursor: pointer; font-weight: bold; }
        
        /* Profile Card Styling */
        .profile-card { text-align: center; background: #25293a; padding: 20px; border-radius: 12px; border: 1px solid #2a2e3f; margin-bottom: 20px; }
        .profile-info { text-align: left; margin-top: 15px; background: #1c2030; padding: 15px; border-radius: 8px; }
        .profile-info p { margin-bottom: 10px; font-size: 15px; color: #b7bdc6; }
        .profile-info strong { color: white; }
        .logout-btn { background: #363c4e; color: #f6465d; margin-top: 20px; }
        .logout-btn:hover { background: #40475c; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-section">
        <div style="font-size: 50px;">👑</div>
        <h2>Forex P2P Squad</h2>
    </div>

    <div id="register-page" class="page active">
        <h3>አዲስ አካውንት መክፈቻ</h3>
        <div class="input-group">
            <label>ሙሉ ስም</label>
            <input type="text" id="reg-name" placeholder="የእርስዎን ስም ያስገቡ">
        </div>
        <div class="input-group">
            <label>ስልክ ቁጥር</label>
            <input type="tel" id="reg-phone" placeholder="09xxxxxxxx">
        </div>
        <div class="input-group">
            <label>የይለፍ ቃል (Password)</label>
            <input type="password" id="reg-pass" placeholder="ጠንካራ ፓስወርድ ያስገቡ">
        </div>
        <button onclick="handleRegister()">አካውንት ክፈት (Register)</button>
        <p class="switch-text">አካውንት አለዎት? <span onclick="switchPage('login-page')">Login ይግቡ</span></p>
    </div>

    <div id="login-page" class="page">
        <h3>መግቢያ ገጽ (Login)</h3>
        <div class="input-group">
            <label>ስልክ ቁጥር</label>
            <input type="tel" id="login-phone" placeholder="የተመዘገቡበት ስልክ">
        </div>
        <div class="input-group">
            <label>የይለፍ ቃል (Password)</label>
            <input type="password" id="login-pass" placeholder="ፓስወርድዎን ያስገቡ">
        </div>
        <button onclick="handleLogin()">ግባ (Login)</button>
        <p class="switch-text">አዲስ ነዎት? <span onclick="switchPage('register-page')">አካውንት ክፈት</span></p>
    </div>

    <div id="profile-page" class="page">
        <h3>የእርስዎ ፕሮፋይል</h3>
        <div class="profile-card">
            <div style="font-size: 40px;">👤</div>
            <h4 id="user-display-name" style="color: #f3ba2f; margin-top: 5px;">---</h4>
            <p style="color: #848e9c; font-size: 13px;">የተከበረ የቡድናችን አባል</p>
        </div>
        <div class="profile-info">
            <p>📌 <strong>የአባልነት ስም፦</strong> <span id="p-name">---</span></p>
            <p>📞 <strong>ስልክ ቁጥር፦</strong> <span id="p-phone">---</span></p>
            <p>💼 <strong>የአካውንት ሁኔታ፦</strong> <span style="color: #0ecb81; font-weight: bold;">Active ✅</span></p>
        </div>
        <button class="logout-btn" onclick="handleLogout()">ውጣ (Logout)</button>
    </div>
</div>

<script>
    // ገጾችን ማቀያየሪያ
    function switchPage(pageId) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    // አፑ ሲከፈት መጀመሪያ ተጠቃሚው ድሮ መግባቱን ማረጋገጫ (Remember Me ሎጂክ)
    window.onload = function() {
        const loggedInUser = localStorage.getItem('currentUser');
        if (loggedInUser) {
            // ድሮ ገብቶ ከነበረ በቀጥታ ፕሮፋይል ገጽ ይወስደዋል!
            showProfile(JSON.parse(loggedInUser));
        }
    };

    // የምዝገባ (Register) ስራ
    function handleRegister() {
        const name = document.getElementById('reg-name').value.trim();
        const phone = document.getElementById('reg-phone').value.trim();
        const pass = document.getElementById('reg-pass').value.trim();

        if (!name || !phone || !pass) {
            alert('❌ እባክዎ ሁሉንም መረጃዎች በትክክል ይሙሉ!');
            return;
        }

        const userData = { name: name, phone: phone, password: pass };
        
        // መረጃውን በስልኩ ማህደረ ትውስታ ውስጥ መመዝገብ
        localStorage.setItem('user_' + phone, JSON.stringify(userData));
        localStorage.setItem('currentUser', JSON.stringify(userData)); // እንዲያስታውሰው

        alert('🎉 ምዝገባዎ በተሳካ ሁኔታ ተጠናቋል!');
        showProfile(userData);
    }

    // የመግቢያ (Login) ስራ
    function handleLogin() {
        const phone = document.getElementById('login-phone').value.trim();
        const pass = document.getElementById('login-pass').value.trim();

        if (!phone || !pass) {
            alert('❌ እባክዎ ስልክ እና ፓስወርድ ያስገቡ!');
            return;
        }

        // የተመዘገበውን አካውንት መፈለግ
        const savedUser = localStorage.getItem('user_' + phone);

        if (savedUser) {
            const userData = JSON.parse(savedUser);
            if (userData.password === pass) {
                localStorage.setItem('currentUser', JSON.stringify(userData)); // እንዲያስታውሰው
                alert('👋 እንኳን ደህና መጡ!');
                showProfile(userData);
            } else {
                alert('❌ ያስገቡት የይለፍ ቃል (Password) የተሳሳተ ነው!');
            }
        } else {
            alert('❌ ይህ ስልክ ቁጥር አልተመዘገበም!');
        }
    }

    // ፕሮፋይል ገጽን ማሳያ እና ዳታ መሙያ
    function showProfile(user) {
        document.getElementById('user-display-name').innerText = user.name;
        document.getElementById('p-name').innerText = user.name;
        document.getElementById('p-phone').innerText = user.phone;
        switchPage('profile-page');
    }

    // ከእነአካቴው መውጫ (Logout)
    function handleLogout() {
        localStorage.removeItem('currentUser'); // ማህደረ ትውስታውን ማጽዳት
        // ፎርሞቹን ማጽዳት
        document.getElementById('login-phone').value = '';
        document.getElementById('login-pass').value = '';
        switchPage('login-page');
    }
</script>

</body>
</html>

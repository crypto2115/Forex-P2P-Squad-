<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forex P2P Squad</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #131722; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 400px; background: #1c2030; padding: 30px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); border: 1px solid #2a2e3f; }
        
        /* Logo Header */
        .logo-section { text-align: center; margin-bottom: 25px; }
        .logo-section .crown { font-size: 50px; }
        .logo-section h2 { color: #f3ba2f; margin-top: 5px; font-size: 22px; }
        .logo-section p { color: #b7bdc6; font-size: 14px; margin-top: 5px; }

        /* Page Toggle Control */
        .page { display: none; }
        .page.active { display: block; }
        
        h3 { margin-bottom: 20px; text-align: center; color: #b7bdc6; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #848e9c; font-size: 14px; }
        input { width: 100%; padding: 12px; background: #2b3139; border: 1px solid #474d57; border-radius: 8px; color: white; font-size: 16px; outline: none; }
        input:focus { border-color: #f3ba2f; }
        
        /* Buttons */
        button { width: 100%; padding: 14px; background: #f3ba2f; border: none; border-radius: 8px; color: #1e2329; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:hover { background: #e0aa2b; }
        .switch-text { text-align: center; margin-top: 15px; font-size: 14px; color: #848e9c; }
        .switch-text span { color: #f3ba2f; cursor: pointer; font-weight: bold; }
        
        /* Trading View (Buy/Sell Buttons) */
        .trade-container { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .btn-trade { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 16px; border-radius: 8px; font-size: 18px; font-weight: bold; text-decoration: none; color: white; border: 2px solid #f3ba2f; background: transparent; transition: 0.2s; cursor: pointer; }
        .btn-trade.buy:hover { background: rgba(14, 203, 129, 0.1); }
        .btn-trade.sell:hover { background: rgba(246, 70, 93, 0.1); }
        .dot { width: 15px; height: 15px; border-radius: 50%; }
        .dot.green { background-color: #0ecb81; box-shadow: 0 0 10px #0ecb81; }
        .dot.red { background-color: #f6465d; box-shadow: 0 0 10px #f6465d; }
        
        /* Mini Profile Bar inside Trading Page */
        .mini-profile { background: #25293a; padding: 12px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; border: 1px solid #2a2e3f; }
        .logout-link { color: #f6465d; cursor: pointer; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-section">
        <div class="crown">👑</div>
        <h2>Forex P2P Squad</h2>
    </div>

    <div id="register-page" class="page active">
        <h3>አዲስ አካውንት መክፈቻ</h3>
        <div class="input-group">
            <label>ሙሉ ስም</label>
            <input type="text" id="reg-name" placeholder="የእርስዎን ስም ያስገቡ">
        </div>
        <div class="input-group">
            <label>ስልክ ቁጥር</label>
            <input type="tel" id="reg-phone" placeholder="09xxxxxxxx">
        </div>
        <div class="input-group">
            <label>የይለፍ ቃል (Password)</label>
            <input type="password" id="reg-pass" placeholder="ጠንካራ ፓስወርድ ያስገቡ">
        </div>
        <button onclick="handleRegister()">አካውንት ክፈት (Register)</button>
        <p class="switch-text">አካውንት አለዎት? <span onclick="switchPage('login-page')">Login ይግቡ</span></p>
    </div>

    <div id="login-page" class="page">
        <h3>መግቢያ ገጽ (Login)</h3>
        <div class="input-group">
            <label>ስልክ ቁጥር</label>
            <input type="tel" id="login-phone" placeholder="የተመዘገቡበት ስልክ">
        </div>
        <div class="input-group">
            <label>የይለፍ ቃል (Password)</label>
            <input type="password" id="login-pass" placeholder="ፓስወርድዎን ያስገቡ">
        </div>
        <button onclick="handleLogin()">ግባ (Login)</button>
        <p class="switch-text">አዲስ ነዎት? <span onclick="switchPage('register-page')">አካውንት ክፈት</span></p>
    </div>

    <div id="trading-page" class="page">
        <div class="mini-profile">
            <span>👤 ሰላም፣ <strong id="user-bar-name" style="color: #f3ba2f;">---</strong></span>
            <span class="logout-link" onclick="handleLogout()">ውጣ (Logout)</span>
        </div>
        
        <h3>Welcome! Tap below to start trading.</h3>
        <p style="text-align: center; color: #848e9c; font-size: 14px; margin-top: -10px; margin-bottom: 20px;">on Telegram Mini App.</p>
        
        <div class="trade-container">
            <button class="btn-trade buy" onclick="alert('የመግዣ ሰሌዳ በመዘጋጀት ላይ ነው...')">
                <div class="dot green"></div> Buy USDT
            </button>
            <button class="btn-trade sell" onclick="alert('የመሸጫ ሰሌዳ በመዘጋጀት ላይ ነው...')">
                <div class="dot red"></div> Sell USDT
            </button>
        </div>
    </div>
</div>

<script>
    // ገጾችን ማቀያየሪያ
    function switchPage(pageId) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        const targetPage = document.getElementById(pageId);
        if (targetPage) {
            targetPage.classList.add('active');
        }
    }

    // አፑ ሲከፈት ድሮ መግባቱን በጀርባ የማረጋገጫ ሎጂክ (Remember Me)
    window.onload = function() {
        const loggedInUser = localStorage.getItem('currentUser');
        if (loggedInUser) {
            // ድሮ ገብቶ ከነበረ ምንም ሳይጠይቅ ቀጥታ ወደ ንግድ ገጽ ይወስደዋል!
            autoLogin(JSON.parse(loggedInUser));
        }
    };

    // የምዝገባ (Register) ስራ
    function handleRegister() {
        const name = document.getElementById('reg-name').value.trim();
        const phone = document.getElementById('reg-phone').value.trim();
        const pass = document.getElementById('reg-pass').value.trim();

        if (!name || !phone || !pass) {
            alert('❌ እባክዎ ሁሉንም መረጃዎች በትክክል ይሙሉ!');
            return;
        }

        const userData = { name: name, phone: phone, password: pass };
        
        // መረጃውን በስልኩ ላይ መመዝገብ
        localStorage.setItem('user_' + phone, JSON.stringify(userData));
        localStorage.setItem('currentUser', JSON.stringify(userData)); 

        alert('🎉 ምዝገባዎ በተሳካ ሁኔታ ተጠናቋል!');
        autoLogin(userData);
    }

    // የመግቢያ (Login) ስራ
    function handleLogin() {
        const phone = document.getElementById('login-phone').value.trim();
        const pass = document.getElementById('login-pass').value.trim();

        if (!phone || !pass) {
            alert('❌ እባክዎ ስልክ እና ፓስወርድ ያስገቡ!');
            return;
        }

        const savedUser = localStorage.getItem('user_' + phone);

        if (savedUser) {
            const userData = JSON.parse(savedUser);
            if (userData.password === pass) {
                localStorage.setItem('currentUser', JSON.stringify(userData)); 
                alert('👋 እንኳን ደህና መጡ!');
                autoLogin(userData);
            } else {
                alert('❌ ያስገቡት የይለፍ ቃል (Password) የተሳሳተ ነው!');
            }
        } else {
            alert('❌ ይህ ስልክ ቁጥር አልተመዘገበም!');
        }
    }

    // 🚀 ምንም በተን ሳይነካ ቀጥታ ወደ ንግድ ገጽ የሚያስገባ ፈንክሽን
    function autoLogin(user) {
        if(document.getElementById('user-bar-name')) {
            document.getElementById('user-bar-name').innerText = user.name;
        }
        switchPage('trading-page'); 
    }

    // ከእነአካቴው መውጫ (Logout)
    function handleLogout() {
        localStorage.removeItem('currentUser'); 
        // ፎርሞቹን ማጽዳት
        document.getElementById('login-phone').value = '';
        document.getElementById('login-pass').value = '';
        document.getElementById('reg-name').value = '';
        document.getElementById('reg-phone').value = '';
        document.getElementById('reg-pass').value = '';
        switchPage('login-page');
    }
</script>

</body>
</html>
